# ReAct Generator config (Phase 1)
# 出题 model: Qwen3-8B. 比 student (Qwen2.5-7B / GRPO) 稍大一档。
# bf16 权重 ~16GB,单张 H100 80GB 绰绰有余;2/4 卡配置只是为了更长 KV cache + 吞吐.
# Qwen3 默认带 thinking mode,prompt 里可加 /no_think 关掉,或靠 chat_template 控制.

model:
  name: "Qwen/Qwen3-8B"
  backend: "vllm"           # served separately from Student training GPUs
  temperature: 0.7
  max_tokens: 4096

react:
  observe_window: 50        # last N Student training steps fed to [Observe]
  failure_samples_per_tag: 3
  tasks_per_round: 32

memory:
  profile_refresh_every: 4  # rebuild student_profile every K rounds
  exemplar_pool_size: 16    # Phase 2 (prompt self-optimization)
